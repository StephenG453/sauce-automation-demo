name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets you trigger a run manually from the Actions tab without pushing.
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright suite
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      # Uploads the HTML report (with traces/screenshots/video on failure)
      # as a downloadable artifact, even if the run failed.
      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14